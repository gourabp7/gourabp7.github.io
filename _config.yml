    layout: list # Type of content section (list/text)
    content:
      - layout: top-middle
        title: DFT-FE
        link: github.com/dftfeDevelopers/dftfe
        # link_text: Project Website
        # additional_links:
        #   - title:  sproogen/modern-resume-theme
        #     icon: fab fa-github
        #     url: github.com/sproogen/modern-resume-theme
          # - title:  Github page for project (eg. sproogen/modern-resume-theme)
          #   icon: fab fa-github
          #   url: Link to project (eg. sproogen.github.io/modern-resume-theme)
        quote: >
          2019 ACM Gordon Bell Prize Finalist, the highest prize in Scientific Computing.
        description: | # this will include new lines to allow paragraphs
          Contributor to DFT-FE (C++/CUDA/MPI), a massively parallel finite-element based open-source code for material modeling using density functional theory (DFT). DFT-FE can handle periodic, non-periodic and semi-periodic calculations. It can further handle both pseudopotential (ONCV, Troullier-Martins) and all-electron (non-relativistic) calculations; XC functionals supported are LDA, GGA (including spin-polarized); Capabilities include ground-state calculations, structural relaxations (ionic, cell), ab-initio MD (NVE). Scalability tested on ~200,000 MPI tasks on many-core architectures and ~24,000 GPUs on hybrid CPU-GPU architectures.

