          In my Bachelors Thesis titled "Orbital Effect of Magnetic Field on a Current Driven System" under Prof. Sumilan Banerjee, I studied Non-Hermitian PT-Symmetric quantum hamiltonian models used to describe nonequilibrium steady states of dissipative quantum systems.

