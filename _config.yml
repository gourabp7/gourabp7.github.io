        description: | # this will include new lines to allow paragraphs
            Developing hardware-aware computational algorithms based on the matrix-free paradigm to evaluate on-the-fly finite-element discretized matrix-multivector products arising in solving the DFT problem without
            storing the cell-level matrices or the global sparse matrix.

