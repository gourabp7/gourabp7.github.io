        description: | # this will include new lines to allow paragraphs
          In my Masters Thesis titled "Time-dependent Density Functional Theory" under Prof. Manish Jain, I worked with implementating a time-dependent density functional theory module in anin-house python port of quantum espresso and applying it to study the response or the induced polarization when a time-dependent electric field is applied to a system.

