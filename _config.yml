about_content: | # this will include new lines to allow paragraphs
  Hi, my name's Gourab and I'm a PhD Student at the Department of Computational Data Sciences, Indian Institute of Science, Bangalore. My research focusses on developing hardware-aware computational algorithms and
  novel implementation procedures that can further accelerate quantum modeling of materials on extreme-scaling computing architectures using Finite Element discretization of Kohn-Sham Density Functional Theory equations.

  I am most skilled in: <mark>CUDA C/C++</mark>, <mark>C/C++</mark>, <mark>OpenMPI</mark> and <mark>Python</mark>

